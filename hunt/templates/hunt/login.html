{% extends 'hunt/base.html' %}

{% block content %}
<style>
    .auth-wrap {
        max-width: 420px;
        margin: 4rem auto;
    }

    .auth-header {
        text-align: center;
        margin-bottom: 2rem;
    }

    .auth-header h2 {
        font-size: 2.2rem;
        color: var(--cream);
        margin-bottom: 0.5rem;
    }

    .auth-header p {
        color: var(--fog);
        font-size: 0.95rem;
        font-weight: 300;
    }

    .demo-banner {
        background: rgba(196,134,74,0.1);
        border: 1px solid rgba(196,134,74,0.3);
        border-radius: 8px;
        padding: 1rem 1.2rem;
        margin-bottom: 1.5rem;
    }

    .demo-banner p.demo-label {
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--dawn);
        font-weight: 600;
        margin-bottom: 0.5rem;
    }

    .demo-banner p {
        font-size: 0.9rem;
        color: var(--cream-dark);
        margin-bottom: 0.25rem;
    }

    .demo-banner p strong {
        color: var(--cream);
    }

    .auth-card {
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(196,134,74,0.15);
        border-radius: 12px;
        padding: 2rem;
        backdrop-filter: blur(8px);
    }

    .auth-card p { margin-bottom: 1.2rem; }

    .auth-card p label {
        display: block;
        font-size: 0.8rem;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--fog);
        margin-bottom: 6px;
    }

    .auth-card p input {
        width: 100%;
        background: rgba(0,0,0,0.3);
        border: 1px solid rgba(139,158,138,0.25);
        border-radius: 6px;
        padding: 10px 14px;
        color: var(--cream);
        font-family: 'Source Sans 3', sans-serif;
        font-size: 0.95rem;
        transition: border-color 0.2s;
    }

    .auth-card p input:focus {
        outline: none;
        border-color: var(--dawn);
    }

    .errorlist {
        color: #E07070;
        font-size: 0.82rem;
        list-style: none;
        margin-top: 4px;
    }

    .btn-primary {
        width: 100%;
        background: var(--dawn);
        color: var(--bark);
        border: none;
        border-radius: 6px;
        padding: 12px;
        font-family: 'Playfair Display', serif;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        letter-spacing: 0.03em;
        transition: background 0.2s, transform 0.1s;
        margin-top: 0.5rem;
    }

    .btn-primary:hover {
        background: var(--dawn-light);
        transform: translateY(-1px);
    }

    .auth-footer {
        text-align: center;
        margin-top: 1.5rem;
        color: var(--fog);
        font-size: 0.9rem;
    }

    .auth-footer a {
        color: var(--dawn-light);
        text-decoration: none;
    }
</style>

<div class="auth-wrap">
    <div class="auth-header">
        <h2>Welcome Back</h2>
        <p>Sign in to check your hunting forecast</p>
    </div>

    <div class="demo-banner">
        <p class="demo-label">🦌 Demo Account</p>
        <p>Username: <strong>demo</strong></p>
        <p>Password: <strong>Testing321</strong></p>
    </div>

    <div class="auth-card">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn-primary">Sign In</button>
        </form>
    </div>

    <div class="auth-footer">
        No account? <a href="{% url 'register' %}">Create one</a>
    </div>
</div>
{% endblock %}
